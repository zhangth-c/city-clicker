<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patchwork Borough</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="panel masthead">
        <h1 id="game-title">Patchwork Borough</h1>

        <div class="utility-row utility-row--top">
          <button class="utility-button" id="save-button" type="button">Save</button>
          <button class="utility-button" id="export-button" type="button">Export</button>
          <button class="utility-button" id="import-button" type="button">Load</button>
          <button class="utility-button utility-button--danger" id="reset-button" type="button">
            Reset
          </button>
          <input
            id="import-input"
            class="visually-hidden"
            type="file"
            accept="application/json,.json"
          />
        </div>
      </header>

      <nav class="panel view-nav">
        <div class="view-tabs" id="view-tabs"></div>
      </nav>

      <section class="panel command-center" id="area-panel">
        <div class="section-heading section-heading--stacked">
          <p class="section-kicker">Area</p>
          <h2 id="area-title"></h2>
          <p class="goal-line" id="area-goal"></p>
        </div>

        <div class="stats-grid stats-grid--local" id="local-stats"></div>
        <div class="manual-actions" id="manual-actions"></div>
        <p class="status-strip" id="status-line" hidden></p>
      </section>

      <section class="panel encyclopedia-panel" id="encyclopedia-panel" hidden>
        <div class="section-heading section-heading--minimal">
          <h2>Encyclopedia</h2>
        </div>

        <div class="filter-row">
          <label class="filter-field">
            <span>Mode</span>
            <select id="codex-kind-filter">
              <option value="buildings">Buildings</option>
              <option value="policies">Policies</option>
            </select>
          </label>
          <label class="filter-field">
            <span>Area</span>
            <select id="codex-area-filter"></select>
          </label>
          <label class="filter-field">
            <span>Family / Tree</span>
            <select id="codex-family-filter"></select>
          </label>
          <label class="filter-field">
            <span>Category</span>
            <select id="codex-category-filter"></select>
          </label>
          <label class="filter-field">
            <span>Progress</span>
            <select id="codex-progress-filter"></select>
          </label>
        </div>

        <div class="codex-summary" id="codex-summary"></div>
        <div class="codex-list" id="codex-list"></div>
      </section>

      <div class="content-grid" id="play-grid">
        <section class="panel market-panel">
          <div class="section-heading section-heading--minimal">
            <h2>Buildings</h2>
          </div>

          <p class="section-hint" id="district-hint" hidden></p>
          <div class="card-list" id="buildings-list"></div>
        </section>

        <aside class="sidebar">
          <section class="panel market-panel" id="active-policies-panel" hidden>
            <div class="section-heading section-heading--minimal">
              <h2>Active Policies</h2>
            </div>

            <div class="active-policy-list" id="active-policies-list"></div>
          </section>

          <section class="panel market-panel" id="policies-panel">
            <div class="section-heading section-heading--minimal">
              <h2>Policy Trees</h2>
            </div>

            <div class="policy-tree-list" id="policy-trees"></div>
          </section>

          <section class="panel annex-panel" id="annex-panel" hidden>
            <div class="section-heading section-heading--minimal">
              <h2>Annexation</h2>
            </div>

            <div class="annex-summary" id="annexation-summary"></div>
            <button class="collect-button collect-button--secondary" id="annex-button" type="button">
              Annex district
            </button>
          </section>
        </aside>
      </div>
    </div>

    <script src="./src/main.js" type="module"></script>
  </body>
</html>
