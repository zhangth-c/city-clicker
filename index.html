<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patchwork Borough</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="panel masthead">
        <p class="eyebrow" id="eyebrow">HTML5 City Clicker</p>
        <h1 id="game-title">Patchwork Borough</h1>
        <p class="goal-line" id="goal-line"></p>

        <div class="utility-row utility-row--top">
          <button class="utility-button" id="save-button" type="button">Save</button>
          <button class="utility-button" id="export-button" type="button">Export</button>
          <button class="utility-button" id="import-button" type="button">Load</button>
          <button class="utility-button utility-button--danger" id="reset-button" type="button">
            Reset
          </button>
          <input
            id="import-input"
            class="visually-hidden"
            type="file"
            accept="application/json,.json"
          />
        </div>
      </header>

      <section class="stats-grid" id="stats-grid" aria-label="City resources"></section>

      <section class="panel command-center">
        <div class="tax-button-wrap">
          <button class="collect-button" id="collect-button" type="button">
            <span id="collect-label"></span>
            <strong id="coins-per-click"></strong>
          </button>
        </div>

        <div class="status-strip" id="status-line" hidden></div>
      </section>

      <div class="content-grid" id="content-grid">
        <section class="panel market-panel">
          <div class="section-heading section-heading--minimal">
            <h2>Districts</h2>
          </div>

          <div class="card-list" id="buildings-list"></div>
        </section>

        <aside class="sidebar" id="sidebar">
          <section class="panel market-panel" id="policies-panel">
            <div class="section-heading section-heading--minimal">
              <h2>Policies</h2>
            </div>

            <div class="card-list card-list--compact" id="upgrades-list"></div>
          </section>

          <section class="panel annex-panel" id="annex-panel" hidden>
            <div class="section-heading section-heading--minimal">
              <h2>Annexation</h2>
            </div>

            <div class="annex-summary" id="annexation-summary"></div>
            <button class="collect-button collect-button--secondary" id="annex-button" type="button">
              Annex district
            </button>
          </section>
        </aside>
      </div>
    </div>

    <script src="./src/main.js" type="module"></script>
  </body>
</html>
